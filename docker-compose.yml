version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: legal_postgres
    environment:
      POSTGRES_DB: law_case_system
      POSTGRES_USER: law_user
      POSTGRES_PASSWORD: law_pass_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U law_user -d law_case_system"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: legal_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: legal_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  celery_worker:
    image: legal_backend:1.0.0
    container_name: legal_celery
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://law_user:law_pass_2024@postgres:5432/law_case_system
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      SILICONFLOW_API_KEY: sk-fhesusitigfmnrhxsfqvtbwwcddknqewpvjdqgssbpguzyod
      MINIMAX_API_KEY: sk-cp-du8rGXgUamZFeQYdB32UU1UMltNMgLHUWHaAqEaYqEp_Yzaq9LfSc7pyJkOos-qxyOzLraPYc7Kochv5NIrN_LJ3a9Q_zro0WBjTd3qUqepkBL8idFCLz3s
      CHROMA_PERSIST_DIR: /app/app/chroma_db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  fastapi:
    image: legal_backend:1.0.0
    container_name: legal_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://law_user:law_pass_2024@postgres:5432/law_case_system
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      JWT_SECRET: law_case_jwt_secret_2024
      SILICONFLOW_API_KEY: sk-fhesusitigfmnrhxsfqvtbwwcddknqewpvjdqgssbpguzyod
      MINIMAX_API_KEY: sk-cp-du8rGXgUamZFeQYdB32UU1UMltNMgLHUWHaAqEaYqEp_Yzaq9LfSc7pyJkOos-qxyOzLraPYc7Kochv5NIrN_LJ3a9Q_zro0WBjTd3qUqepkBL8idFCLz3s
      CHROMA_PERSIST_DIR: /app/app/chroma_db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: legal_frontend:1.0.0
    container_name: legal_frontend
    ports:
      - "3000:80"
    depends_on:
      - fastapi
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

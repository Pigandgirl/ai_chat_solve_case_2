version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: legal_postgres
    environment:
      POSTGRES_DB: law_case_system
      POSTGRES_USER: law_user
      POSTGRES_PASSWORD: law_pass_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U law_user -d law_case_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: legal_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: legal_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legal_celery
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://law_user:law_pass_2024@postgres:5432/law_case_system
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      SILICONFLOW_API_KEY: your_key_input_here
      MINIMAX_API_KEY: your_key_input_here
      CHROMA_PERSIST_DIR: /app/app/chroma_db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./requirements.txt:/app/requirements.txt

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legal_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://law_user:law_pass_2024@postgres:5432/law_case_system
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      JWT_SECRET: your_key_input_here
      SILICONFLOW_API_KEY: your_key_input_here
      MINIMAX_API_KEY: your_key_input_here
      CHROMA_PERSIST_DIR: /app/app/chroma_db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./requirements.txt:/app/requirements.txt

  smoke_test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legal_smoke_test
    command: python scripts/smoke_test.py
    environment:
      SMOKE_API_HOST: fastapi
      SMOKE_API_PORT: "8000"
      SMOKE_FRONTEND_HOST: host.docker.internal
      SMOKE_FRONTEND_PORT: "3000"
    depends_on:
      fastapi:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  minio_data:
